prompt_id: ai_layer.plain_language.match_reason
version: 1.0.0
purpose: |
  Render the `match_reason_plain_language` string explaining why a transaction
  was matched to a document. Tier 2 by default. The output drops the title
  field entirely — match cards have a fixed title shape rendered server-side.
ai_tier: LOCAL_LLM
input_schema:
  type: object
  required: [match_level, transaction_summary, document_summary, score_breakdown, language]
  properties:
    match_level:
      type: string
      description: Internal enum (EXACT / STRONG_PROBABLE / WEAK_POSSIBLE). MUST NOT echo.
    transaction_summary:
      type: object
      description: amount, currency, date, counterparty_label.
    document_summary:
      type: object
      description: document_label, amount, currency, date, reference.
    score_breakdown:
      type: object
      description: per-signal scores (amount_match, date_distance_days, name_similarity).
    language:
      type: string
      enum: [en]
  additionalProperties: false
output_schema:
  type: object
  required: [description, language]
  properties:
    description:
      type: string
      description: 1-3 sentences, max 300 characters.
    language:
      type: string
      enum: [en]
  additionalProperties: false
