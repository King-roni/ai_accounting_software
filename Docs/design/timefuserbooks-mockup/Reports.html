<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeFuserBooks — Reports</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/shell.css">
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1.2s linear infinite; display: inline-flex; }

  .tabs { display: flex; gap: 24px; border-bottom: 1px solid var(--border-default); margin-bottom: 20px; }
  .tab { padding: 0 1px 12px; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.on { color: var(--text-primary); font-weight: 600; border-bottom-color: var(--brand); }

  .tbl-card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--r-card); box-shadow: var(--elev-1); overflow: hidden; }
  .tbl-scroll { overflow-x: auto; }
  table.rep { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 820px; }
  table.rep thead th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); padding: 11px 16px; border-bottom: 1px solid var(--border-default); background: var(--surface-sunken); white-space: nowrap; }
  table.rep tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border-subtle); vertical-align: middle; }
  table.rep tbody tr:last-child td { border-bottom: none; }
  table.rep tbody tr:hover { background: var(--surface-sunken); }
  .rep-name { font-weight: 600; } .rep-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; max-width: 360px; }
  .fmt-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .fmt { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: var(--surface-sunken); border: 1px solid var(--border-default); color: var(--text-secondary); }
  .scope-chip { font-size: 11.5px; color: var(--text-secondary); background: var(--brand-tint); border: 1px solid color-mix(in srgb, var(--brand) 16%, transparent); border-radius: 6px; padding: 2px 9px; }
  .col-r { text-align: right; }

  table.hist td .dl { }
  .hist-when { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-secondary); }
  .pending-note { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-muted); }
  .pending-note svg { width: 12px; height: 12px; }
</style>
</head>
<body>
<main class="main" id="main">
  <div class="main-inner">

    <div class="page-head">
      <div data-screen-label="Reports">
        <div class="ttl">Reports</div>
        <div class="sub">Demo Trading Ltd · May 2026</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab on" data-tab="catalogue">Export catalogue</div>
      <div class="tab" data-tab="history">Export history</div>
    </div>

    <!-- CATALOGUE -->
    <div id="tab-catalogue">
      <div class="tbl-card">
        <div class="tbl-scroll">
          <table class="rep">
            <thead><tr><th>Report</th><th>Formats</th><th>Scope</th><th class="col-r">Action</th></tr></thead>
            <tbody id="catBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="tab-history" style="display:none;">
      <div class="tbl-card">
        <div class="tbl-scroll">
          <table class="rep hist">
            <thead><tr><th>Report</th><th>Format</th><th>Requested</th><th>Status</th><th class="col-r">Download</th></tr></thead>
            <tbody id="histBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="shared/shell.js"></script>
<script>
  CB.renderShell({ active: 'reports' });
  const icon = CB.icon;

  const CATALOGUE = [
    ['VAT return (Form VAT 4)','Cyprus VAT 4 quarterly return, input/output/net.',['PDF','XML'],'Quarter'],
    ['VIES recapitulative statement','EU cross-border supplies for VIES submission.',['XML','CSV'],'Quarter'],
    ['Trial balance','All accounts with debit/credit balances.',['PDF','XLSX'],'Period'],
    ['Profit & loss','Income and expenses for the period.',['PDF','XLSX'],'Period'],
    ['Balance sheet','Assets, liabilities and equity snapshot.',['PDF','XLSX'],'Period'],
    ['General ledger','Every posting line by account.',['XLSX','CSV'],'Period'],
    ['Income by client','Revenue grouped by client.',['PDF','XLSX'],'Year'],
    ['Expense breakdown','Spend grouped by category.',['PDF','XLSX'],'Period'],
    ['Aged receivables','Outstanding client invoices by age.',['PDF','XLSX'],'Period'],
    ['Aged payables','Outstanding supplier bills by age.',['PDF','XLSX'],'Period'],
    ['Bank reconciliation','Matched vs unmatched bank lines.',['PDF','CSV'],'Period'],
    ['Audit trail / journal','Full tamper-evident journal export.',['CSV','XML'],'Custom'],
    ['Transaction register','All transactions with classifications.',['XLSX','CSV'],'Period'],
  ];

  document.getElementById('catBody').innerHTML = CATALOGUE.map((r, i) => `
    <tr>
      <td><div class="rep-name">${r[0]}</div><div class="rep-desc">${r[1]}</div></td>
      <td><div class="fmt-chips">${r[2].map(f => `<span class="fmt">${f}</span>`).join('')}</div></td>
      <td><span class="scope-chip">${r[3]}</span></td>
      <td class="col-r"><button class="btn btn-secondary btn-sm" onclick="generate(${i})">${icon('report')}Generate</button></td>
    </tr>`).join('');

  // history
  const ST = { QUEUED:['Queued','neutral'], GENERATING:['Generating','info'], READY:['Ready','success'], FAILED:['Failed','danger'] };
  let HISTORY = [
    ['VAT return (Form VAT 4)','PDF','2026-05-29 14:02','READY'],
    ['Trial balance','XLSX','2026-05-29 13:50','READY'],
    ['General ledger','CSV','2026-05-29 11:18','GENERATING'],
    ['VIES recapitulative statement','XML','2026-05-28 17:40','QUEUED'],
    ['Bank reconciliation','PDF','2026-05-28 09:12','FAILED'],
    ['Audit trail / journal','CSV','2026-05-27 16:30','READY'],
  ];

  function renderHistory() {
    document.getElementById('histBody').innerHTML = HISTORY.map(h => {
      const [label, tone] = ST[h[3]];
      const badge = h[3] === 'GENERATING'
        ? `<span class="badge badge-${tone}"><span class="spin">${icon('loader')}</span>${label}</span>`
        : `<span class="badge badge-${tone}">${label}</span>`;
      let dl;
      if (h[3] === 'READY') dl = `<button class="btn btn-primary btn-sm">${icon('upload')}<span style="transform:rotate(180deg);display:inline-flex">${icon('upload')}</span>Download</button>`;
      else if (h[3] === 'FAILED') dl = `<button class="btn btn-secondary btn-sm">Retry</button>`;
      else dl = `<span class="pending-note">${icon('clock')} Generation pending backend</span>`;
      return `<tr><td class="rep-name" style="font-weight:600">${h[0]}</td><td><span class="fmt">${h[1]}</span></td><td class="hist-when">${h[2]}</td><td>${badge}</td><td class="col-r">${dl}</td></tr>`;
    }).join('');
  }
  renderHistory();

  // fix the Download button (single down-arrow)
  function fixDownloads() {
    document.querySelectorAll('#histBody .btn-primary').forEach(b => { b.innerHTML = `<span style="transform:rotate(180deg);display:inline-flex">${icon('upload')}</span>Download`; });
  }
  fixDownloads();

  window.generate = i => {
    const r = CATALOGUE[i];
    HISTORY.unshift([r[0], r[2][0], '2026-05-30 09:30', 'QUEUED']);
    renderHistory(); fixDownloads();
    document.querySelector('[data-tab="history"]').click();
  };

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on')); t.classList.add('on');
    const w = t.dataset.tab;
    document.getElementById('tab-catalogue').style.display = w === 'catalogue' ? '' : 'none';
    document.getElementById('tab-history').style.display = w === 'history' ? '' : 'none';
  }));
</script>
</body>
</html>
