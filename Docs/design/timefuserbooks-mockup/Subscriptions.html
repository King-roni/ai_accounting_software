<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeFuserBooks — Subscriptions</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/shell.css">
<style>
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; max-width: 920px; margin-bottom: 18px; }
  @media (max-width: 820px){ .stat-row { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--r-card); box-shadow: var(--elev-1); padding: 14px 16px; }
  .stat .l { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); font-weight: 600; }
  .stat .v { font-family: var(--font-mono); font-size: 22px; font-weight: 600; margin-top: 6px; }
  .stat .vm { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .detect { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-secondary); background: var(--brand-tint); border: 1px solid color-mix(in srgb, var(--brand) 16%, transparent); border-radius: 999px; padding: 5px 13px; margin-bottom: 18px; }
  .detect svg { width: 14px; height: 14px; color: var(--brand); }

  .filters { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .filters .field { height: 38px; }
  .filters .right { margin-left: auto; }

  .tbl-card { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: var(--r-card); box-shadow: var(--elev-1); overflow: hidden; }
  .tbl-scroll { overflow-x: auto; }
  table.subs { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 880px; }
  table.subs thead th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); padding: 11px 16px; border-bottom: 1px solid var(--border-default); background: var(--surface-sunken); white-space: nowrap; }
  table.subs thead th.r { text-align: right; }
  table.subs thead th.sortable { cursor: pointer; user-select: none; }
  table.subs tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); vertical-align: middle; white-space: nowrap; }
  table.subs tbody tr { cursor: pointer; transition: background .1s; }
  table.subs tbody tr:hover { background: var(--surface-sunken); }
  table.subs tbody tr:last-child td { border-bottom: none; }
  table.subs tbody tr.cancelled td { opacity: .5; }
  .vend { display: flex; align-items: center; gap: 12px; }
  .vend .av { width: 36px; height: 36px; border-radius: 9px; display: grid; place-items: center; font-size: 13px; font-weight: 700; color: #fff; flex: none; }
  .vend .vn { font-weight: 600; } .vend .vc { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .amt { font-family: var(--font-mono); text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
  .cad { font-size: 12.5px; color: var(--text-secondary); }
  .nxt { font-family: var(--font-mono); color: var(--text-secondary); font-size: 12.5px; }
  .nxt.soon { color: var(--badge-warning-text); font-weight: 600; }
  .pm { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-secondary); }
  .pm .cc { width: 26px; height: 17px; border-radius: 4px; background: linear-gradient(135deg, var(--brand), var(--brand-active)); flex: none; }

  /* drawer */
  .dd-amt { font-family: var(--font-mono); font-size: 26px; font-weight: 600; letter-spacing: -.01em; }
  .kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px 18px; margin: 4px 0 22px; }
  .kv-grid .k { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .kv-grid .vv { font-size: 13.5px; margin-top: 2px; } .kv-grid .vv.mono { font-family: var(--font-mono); }
  .dl-sec { margin-bottom: 22px; }
  .dl-sec h4 { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-secondary); margin: 0 0 12px; }
  .ch-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
  .ch-row:last-child { border-bottom: none; }
  .ch-row .cd { font-family: var(--font-mono); color: var(--text-secondary); }
  .ch-row .ca { font-family: var(--font-mono); font-weight: 500; }
  .alert-inc { display: flex; gap: 10px; align-items: flex-start; background: var(--badge-warning-bg); border: 1px solid color-mix(in srgb, var(--badge-warning-text) 26%, transparent); border-radius: 10px; padding: 11px 13px; margin-bottom: 20px; }
  .alert-inc svg { width: 16px; height: 16px; color: var(--badge-warning-text); flex: none; margin-top: 1px; }
  .alert-inc .at { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; }
  .alert-inc b { color: var(--badge-warning-text); }
  .drawer-foot { flex-wrap: wrap; }
</style>
</head>
<body>
<main class="main" id="main">
  <div class="main-inner">

    <div class="page-head">
      <div data-screen-label="Subscriptions">
        <div class="ttl">Subscriptions</div>
        <div class="sub">Demo Trading Ltd · recurring spend</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary btn-sm"><span data-i="plus"></span>Add manually</button>
      </div>
    </div>

    <div class="detect"><span data-i="refresh"></span>Auto-detected from your bank transactions · last scan 12 min ago</div>

    <div class="stat-row" id="stats"></div>

    <div class="filters">
      <div class="field" style="min-width:220px;"><span data-i="search"></span><input id="search" placeholder="Search vendors"></div>
      <div class="field"><select id="fCat"><option value="">All categories</option></select><span data-i="chevD"></span></div>
      <div class="field"><select id="fStatus"><option value="">All statuses</option><option>Active</option><option>Trial</option><option>Cancelled</option></select><span data-i="chevD"></span></div>
    </div>

    <div class="tbl-card">
      <div class="tbl-scroll">
        <table class="subs" id="subTable">
          <thead><tr>
            <th>Vendor</th>
            <th class="r sortable" data-sort="amt" style="width:130px;">Amount</th>
            <th style="width:120px;">Billing</th>
            <th class="sortable" data-sort="next" style="width:140px;">Next charge</th>
            <th style="width:160px;">Payment method</th>
            <th style="width:120px;">Status</th>
          </tr></thead>
          <tbody id="subBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- drawer -->
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-top" id="subHead"></div>
  <div class="drawer-body" id="subBodyD"></div>
  <div class="drawer-foot" id="subFoot"></div>
</aside>

<script src="shared/shell.js"></script>
<script>
  CB.renderShell({ active: 'subscriptions' });
  const icon = CB.icon;
  document.querySelectorAll('[data-i]').forEach(el => { el.innerHTML = icon(el.getAttribute('data-i')); });

  const CATCOL = { Cloud:'#3f7d8c', Software:'var(--brand)', Telecom:'#6b5b95', Utilities:'#9a6a4f', Marketing:'var(--bronze)', Sales:'#2f7d54', Professional:'#7a5c8e', Insurance:'#586b8c' };
  const money = a => '€' + a.toLocaleString('en-IE',{minimumFractionDigits:2,maximumFractionDigits:2});
  const STATUS = { Active:'badge-success', Trial:'badge-info', Cancelled:'badge-neutral' };

  // cadence in months for monthly-equivalent
  const CAD_M = { MONTHLY:1, QUARTERLY:3, ANNUAL:12 };
  const cadLabel = c => ({ MONTHLY:'Monthly', QUARTERLY:'Quarterly', ANNUAL:'Annual' })[c];

  const SUBS = [
    { vendor:'Amazon Web Services', cat:'Cloud', amount:213.77, cad:'MONTHLY', next:'2026-06-27', method:'Visa ••4242', status:'Active', started:'2024-02-01', flag:false, init:'AW' },
    { vendor:'HubSpot', cat:'Marketing', amount:460.00, cad:'MONTHLY', next:'2026-06-12', method:'Visa ••4242', status:'Active', started:'2025-01-10', flag:true, init:'HS' },
    { vendor:'EAC Electricity', cat:'Utilities', amount:340.00, cad:'MONTHLY', next:'2026-06-05', method:'Direct debit', status:'Active', started:'2023-06-01', flag:false, init:'EA' },
    { vendor:'Cyta Business Fibre', cat:'Telecom', amount:78.40, cad:'MONTHLY', next:'2026-06-26', method:'Direct debit', status:'Active', started:'2023-04-01', flag:false, init:'CY' },
    { vendor:'Microsoft 365 Business', cat:'Software', amount:52.00, cad:'MONTHLY', next:'2026-06-01', method:'Visa ••4242', status:'Active', started:'2024-03-15', flag:false, init:'MS' },
    { vendor:'Adobe Creative Cloud', cat:'Software', amount:59.99, cad:'MONTHLY', next:'2026-06-03', method:'Visa ••4242', status:'Active', started:'2024-09-01', flag:false, init:'Ad' },
    { vendor:'Slack', cat:'Software', amount:67.50, cad:'MONTHLY', next:'2026-06-18', method:'Visa ••4242', status:'Active', started:'2024-05-20', flag:false, init:'Sl' },
    { vendor:'Google Workspace', cat:'Software', amount:28.80, cad:'MONTHLY', next:'2026-06-14', method:'Visa ••4242', status:'Active', started:'2023-11-01', flag:false, init:'Go' },
    { vendor:'LinkedIn Sales Navigator', cat:'Sales', amount:79.99, cad:'MONTHLY', next:'2026-06-02', method:'Visa ••4242', status:'Trial', started:'2026-05-19', flag:false, init:'in' },
    { vendor:'Company Secretarial', cat:'Professional', amount:600.00, cad:'ANNUAL', next:'2027-01-15', method:'Bank transfer', status:'Active', started:'2023-01-15', flag:false, init:'CS' },
    { vendor:'Business Insurance', cat:'Insurance', amount:1800.00, cad:'ANNUAL', next:'2026-09-30', method:'Bank transfer', status:'Active', started:'2022-09-30', flag:false, init:'BI' },
    { vendor:'Notion', cat:'Software', amount:40.00, cad:'MONTHLY', next:'—', method:'Visa ••4242', status:'Cancelled', started:'2024-08-01', flag:false, init:'No' },
  ];
  SUBS.forEach((s, i) => { s.id = i; s.mEq = s.amount / CAD_M[s.cad]; });

  // category filter options
  const cats = [...new Set(SUBS.map(s => s.cat))].sort();
  document.getElementById('fCat').insertAdjacentHTML('beforeend', cats.map(c => `<option>${c}</option>`).join(''));

  // stats
  function withinDays(dateStr, days) {
    if (dateStr === '—') return false;
    const d = new Date(dateStr), base = new Date('2026-05-30');
    const diff = (d - base) / 86400000;
    return diff >= 0 && diff <= days;
  }
  function renderStats() {
    const active = SUBS.filter(s => s.status !== 'Cancelled');
    const monthly = active.reduce((s, x) => s + x.mEq, 0);
    const annual = monthly * 12;
    const soon = active.filter(s => withinDays(s.next, 7));
    const soonSum = soon.reduce((s, x) => s + x.amount, 0);
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="l">Active subscriptions</div><div class="v">${active.length}</div><div class="vm">${SUBS.length - active.length} cancelled</div></div>
      <div class="stat"><div class="l">Monthly recurring</div><div class="v amt-expense">${money(monthly)}</div><div class="vm">normalised per month</div></div>
      <div class="stat"><div class="l">Annualised</div><div class="v">${money(annual)}</div><div class="vm">projected yearly spend</div></div>
      <div class="stat"><div class="l">Due in 7 days</div><div class="v" style="color:var(--badge-warning-text)">${soon.length}</div><div class="vm mono">${money(soonSum)}</div></div>`;
  }

  let sortKey = 'amt', sortDir = -1;
  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const fc = document.getElementById('fCat').value, fs = document.getElementById('fStatus').value;
    let list = SUBS.filter(s => (!q || s.vendor.toLowerCase().includes(q)) && (!fc || s.cat === fc) && (!fs || s.status === fs));
    list.sort((a, b) => {
      let r = sortKey === 'amt' ? a.mEq - b.mEq : (a.next === '—' ? 1 : b.next === '—' ? -1 : a.next.localeCompare(b.next));
      return r * sortDir;
    });
    document.getElementById('subBody').innerHTML = list.map(s => `
      <tr data-id="${s.id}" class="${s.status === 'Cancelled' ? 'cancelled' : ''}">
        <td><div class="vend"><span class="av" style="background:${CATCOL[s.cat]}">${s.init}</span><div><div class="vn">${s.vendor}</div><div class="vc">${s.cat}</div></div></div></td>
        <td class="amt amt-expense">${money(s.amount)}</td>
        <td><span class="cad">${cadLabel(s.cad)}</span></td>
        <td><span class="nxt ${withinDays(s.next,7)?'soon':''}">${s.next}</span></td>
        <td><span class="pm">${s.method.startsWith('Visa') ? '<span class="cc"></span>' : ''}${s.method}</span></td>
        <td><span class="badge ${STATUS[s.status]}">${s.status}</span>${s.flag ? ` <span class="badge badge-warning" style="margin-left:3px;">${icon('alertTri')}Price up</span>` : ''}</td>
      </tr>`).join('');
    document.querySelectorAll('#subBody tr').forEach(tr => tr.addEventListener('click', () => openDrawer(+tr.dataset.id)));
  }

  document.querySelectorAll('th.sortable').forEach(th => th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = k === 'amt' ? -1 : 1; }
    render();
  }));
  ['search','fCat','fStatus'].forEach(id => document.getElementById(id).addEventListener('input', render));

  function openDrawer(id) {
    const s = SUBS[id];
    document.getElementById('subHead').innerHTML = `
      <div>
        <div style="display:flex;align-items:center;gap:11px;margin-bottom:9px;">
          <span class="vend"><span class="av" style="background:${CATCOL[s.cat]};width:40px;height:40px;border-radius:10px;">${s.init}</span></span>
          <div><div style="font-size:17px;font-weight:600;">${s.vendor}</div><div class="t-meta">${s.cat} · ${s.status}</div></div>
        </div>
        <div class="dd-amt amt-expense">${money(s.amount)} <span class="t-meta" style="font-family:var(--font-ui);font-size:13px;">/ ${cadLabel(s.cad).toLowerCase()}</span></div>
      </div>
      <button class="x-btn" onclick="closeDrawer()">${icon('x')}</button>`;

    // generate recent charge history
    const hist = [];
    if (s.status !== 'Cancelled' && s.cad === 'MONTHLY') {
      const months = ['2026-05','2026-04','2026-03','2026-02'];
      months.forEach((m, i) => hist.push([m + '-' + s.next.slice(8), (s.flag && i === 0) ? s.amount : (s.flag ? s.amount - 40 : s.amount)]));
    }

    document.getElementById('subBodyD').innerHTML = `
      ${s.flag ? `<div class="alert-inc">${icon('alertTri')}<div class="at"><b>Price increased.</b> This subscription went up from ${money(s.amount - 40)} to ${money(s.amount)} this month. Worth reviewing whether it’s still needed.</div></div>` : ''}
      ${s.status === 'Trial' ? `<div class="alert-inc" style="background:var(--badge-info-bg);border-color:color-mix(in srgb,var(--badge-info-text) 22%,transparent);">${icon('clock')}<div class="at" style="color:var(--text-secondary)"><b style="color:var(--badge-info-text)">Free trial.</b> Converts to a paid plan on ${s.next} unless cancelled.</div></div>` : ''}
      <div class="kv-grid">
        <div><div class="k">Billing cycle</div><div class="vv">${cadLabel(s.cad)}</div></div>
        <div><div class="k">Next charge</div><div class="vv mono">${s.next}</div></div>
        <div><div class="k">Payment method</div><div class="vv">${s.method}</div></div>
        <div><div class="k">Active since</div><div class="vv mono">${s.started}</div></div>
        <div><div class="k">Monthly equivalent</div><div class="vv mono">${money(s.mEq)}</div></div>
        <div><div class="k">Annualised</div><div class="vv mono">${money(s.mEq * 12)}</div></div>
      </div>
      ${hist.length ? `<div class="dl-sec"><h4>Recent charges</h4>${hist.map(h => `<div class="ch-row"><span class="cd">${h[0]}</span><span class="ca amt-expense">${money(h[1])}</span></div>`).join('')}</div>` : ''}
      <div class="dl-sec"><h4>Linked records</h4>
        <a class="ch-row" href="Transactions.html" style="text-decoration:none;color:inherit;"><span style="display:flex;align-items:center;gap:9px;">${icon('receipt')} ${hist.length || 14} matched transactions</span><span style="color:var(--text-muted)">${icon('chevR')}</span></a>
      </div>`;

    document.getElementById('subFoot').innerHTML = s.status === 'Cancelled'
      ? `<button class="btn btn-secondary" onclick="closeDrawer()">Close</button><button class="btn btn-secondary">Reactivate</button>`
      : `<button class="btn btn-secondary" onclick="closeDrawer()">Close</button>
         <button class="btn btn-secondary">Recategorize</button>
         <button class="btn btn-danger">Mark as cancelled</button>`;

    document.getElementById('scrim').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  }
  function closeDrawer() { document.getElementById('scrim').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
  window.closeDrawer = closeDrawer;
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  renderStats(); render();
</script>
</body>
</html>
